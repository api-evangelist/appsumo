naftiko: "1.0.0-alpha1"

info:
  label: AppSumo Licensing API
  description: >-
    API for managing AppSumo marketplace licenses, enabling partners to validate,
    activate, and deactivate licenses for customers who purchase through AppSumo.
  tags:
    - AppSumo
    - Licensing
    - Marketplace
    - SaaS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      APPSUMO_API_KEY: APPSUMO_API_KEY

capability:
  consumes:
    - type: http
      namespace: appsumo
      baseUri: "https://appsumo.com/api/v2"
      description: AppSumo Licensing API
      authentication:
        type: apikey
        header: X-AppSumo-API-Key
        key: "{{APPSUMO_API_KEY}}"
      resources:
        - name: licenses
          path: /licenses/{licenseKey}
          description: License management
          operations:
            - name: get-license
              method: GET
              description: Returns license details for a key
              inputParameters:
                - name: licenseKey
                  in: path
                  type: string
                  required: true
                  description: License key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: activate-license
              method: POST
              description: Activates a license key
              inputParameters:
                - name: licenseKey
                  in: path
                  type: string
                  required: true
                  description: License key to activate
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  userId: "{{tools.userId}}"

        - name: profile
          path: /profile
          description: Partner profile
          operations:
            - name: get-profile
              method: GET
              description: Returns partner profile information
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9090
      namespace: appsumo-mcp
      transport: http
      tools:
        - name: get-license
          description: Gets details for an AppSumo license key
          hints:
            readOnly: true
            idempotent: true
          call: "appsumo.get-license"
          with:
            licenseKey: "tools.licenseKey"
          outputParameters:
            - type: object
              mapping: "$."

        - name: activate-license
          description: Activates an AppSumo license key for a customer in the partner application
          hints:
            readOnly: false
            destructive: false
          call: "appsumo.activate-license"
          with:
            licenseKey: "tools.licenseKey"
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-partner-profile
          description: Gets the partner profile for the AppSumo marketplace integration
          hints:
            readOnly: true
            idempotent: true
          call: "appsumo.get-profile"
          outputParameters:
            - type: object
              mapping: "$."
